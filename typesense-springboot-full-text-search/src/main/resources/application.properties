spring.application.name=full-text-search
server.port=${PORT:4000}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Typesense Configuration
typesense.host=${TYPESENSE_HOST}
typesense.port=${TYPESENSE_PORT}
typesense.protocol=${TYPESENSE_PROTOCOL}
typesense.api-key=${TYPESENSE_API_KEY}
typesense.collection-name=${TYPESENSE_COLLECTION_NAME}
typesense.connection-timeout-seconds=${TYPESENSE_CONNECTION_TIMEOUT}

# Sync Configuration
typesense.sync.interval-ms=${TYPESENSE_SYNC_INTERVAL:60000}
typesense.sync.batch-size=${TYPESENSE_SYNC_BATCH_SIZE:1000}
typesense.sync.page-size=${TYPESENSE_SYNC_PAGE_SIZE:1000}
typesense.sync.enable-soft-delete=${TYPESENSE_SYNC_ENABLE_SOFT_DELETE:true}
